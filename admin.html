<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicMedia Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f3ef;
    color:#1a1a1a;
}

.bar{
    background:#5a3b00;
    color:white;
    text-align:center;

.header{
    background:linear-gradient(
        135deg,
        #1a0a00 0%,
        #3d2000 40%,
        #5a3b00 70%,
        #2a1500 100%
    );
    color:white;
    padding:30px;
}

.header h1{
    font-size:32px;
}

    opacity:0.8;

.container{
    max-width:1400px;

.stats{
    display:grid;

    margin-bottom:25px;

.stat-card{
    background:white;

    color:#888;

    font-size:30px;
    margin-top:8px;

    background:white;

.orders-header{

</head>
<body>

<div class="bar">
🎵 MusicMedia Admin Dashboard
</div>

<div class="header">
<h1>Bestellingen</h1>
<p>Overzicht van alle orders</p>
</div>

<div class="container">

<div class="stats">

<div class="stat-card">
<div class="stat-title">Bestellingen</div>
<div class="stat-value" id="orderCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Omzet</div>
<div class="stat-value" id="revenue">€0</div>
</div>

<div class="stat-card">
<div class="stat-title">Klanten</div>
<div class="stat-value" id="customerCount">0</div>
</div>

</div>

<div class="orders-box">

<div class="orders-header">
<h2>Alle bestellingen</h2>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Klant</th>
<th>Adres</th>
<th>Totaal</th>
<th>Status</th>
<th>Acties</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2>Bestelling details</h2>

<div id="orderDetails"></div>

</div>
</div>

<div class="footer">
© 2026 MusicMedia
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyClNzFPAlQeihyZ41piBaZS3T_jhJt1sag",
    authDomain: "informatica-webshop-b07fd.firebaseapp.com",
    databaseURL: "https://informatica-webshop-b07fd-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "informatica-webshop-b07fd",
    storageBucket: "informatica-webshop-b07fd.firebasestorage.app",
    messagingSenderId: "806318839376",
    appId: "1:806318839376:web:ba8b93ea91d0162b56e355"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allOrders = []; // { firebaseKey, ...orderData }

  async function loadDashboard() {
    const snapshot = await get(ref(db, 'orders'));
    allOrders = [];

    if (snapshot.exists()) {
      snapshot.forEach(child => {
        allOrders.push({ firebaseKey: child.key, ...child.val() });
      });
    }

    // Stats
    document.getElementById("orderCount").textContent = allOrders.length;
    const revenue = allOrders.reduce((sum, o) => sum + Number(o.totaal || 0), 0);
    document.getElementById("revenue").textContent = "€" + revenue.toFixed(2);
    const customers = new Set(allOrders.map(o => o.klant?.email || ""));
    document.getElementById("customerCount").textContent = customers.size;

    // Tabel
    const table = document.getElementById("ordersTable");
    table.innerHTML = "";

    if (allOrders.length === 0) {
      table.innerHTML = `<tr><td colspan="6" class="empty">Geen bestellingen gevonden</td></tr>`;
      return;
    }

    allOrders.forEach(order => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${order.datum || "-"}</td>
        <td>${order.klant?.naam || "-"}<br><small>${order.klant?.email || ""}</small></td>
        <td>${order.adres?.straat || ""}<br>${order.adres?.postcode || ""} ${order.adres?.plaats || ""}</td>
        <td>€${Number(order.totaal || 0).toFixed(2)}</td>
        <td><span class="status">${order.status || "Nieuw"}</span></td>
        <td>
          <button class="btn view-btn">Bekijken</button>
          <button class="btn delete-btn" style="margin-left:5px;">Verwijder</button>
        </td>
      `;
      row.querySelector('.view-btn').addEventListener('click', () => showOrder(order.firebaseKey));
      row.querySelector('.delete-btn').addEventListener('click', () => deleteOrder(order.firebaseKey));
      table.appendChild(row);
    });
  }

  window.showOrder = function(key) {
    const order = allOrders.find(o => o.firebaseKey === key);
    if (!order) return;

    let html = `
      <div class="section"><h3>Klantgegevens</h3>
        <p><strong>Naam:</strong> ${order.klant?.naam || "-"}</p>
        <p><strong>Email:</strong> ${order.klant?.email || "-"}</p>
        <p><strong>Telefoon:</strong> ${order.klant?.telefoon || "-"}</p>
      </div>
      <div class="section"><h3>Adres</h3>
        <p>${order.adres?.straat || ""}<br>${order.adres?.postcode || ""}<br>${order.adres?.plaats || ""}</p>
      </div>
      <div class="section"><h3>Producten</h3>`;

    (order.producten || []).forEach(p => {
      html += `<div class="product-item">
        <strong>${p.name || ""}</strong><br>
        ${p.artist || ""}<br>
        Aantal: ${p.qty || 1}<br>
        €${Number(p.price || 0).toFixed(2)}
      </div>`;
    });

    if (order.kortingscode) {
      html += `<div class="section"><p><strong>Kortingscode:</strong> ${order.kortingscode}</p></div>`;
    }

    html += `<div class="section"><h3>Totaal</h3><strong>€${Number(order.totaal || 0).toFixed(2)}</strong></div>`;

    document.getElementById("orderDetails").innerHTML = html;
    document.getElementById("modal").style.display = "flex";
  };

  window.deleteOrder = async function(key) {
    if (!confirm("Weet je zeker dat je deze bestelling wilt verwijderen?")) return;
    await remove(ref(db, `orders/${key}`));
    loadDashboard();
  };

  window.closeModal = function() {
    document.getElementById("modal").style.display = "none";
  };

  loadDashboard();
</script>

</body>
</html>
